<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Tourism Comparison</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Leaflet CSS for maps -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <!-- Chart.js for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-box">
            <h1>مرحبا بك</h1>
            <div class="auth-tabs">
                <button type="button" id="login-tab-btn" class="active" onclick="showAuthTab('login')">تسجيل دخول</button>
                <button type="button" id="register-tab-btn" onclick="showAuthTab('register')">إنشاء حساب</button>
            </div>
            <div id="login-form" class="auth-form active">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" />
                <input type="password" id="login-password" placeholder="كلمة المرور" />
                <button type="button" onclick="loginUser()">دخول</button>
            </div>
            <div id="register-form" class="auth-form">
                <input type="email" id="register-email" placeholder="البريد الإلكتروني" />
                <input type="password" id="register-password" placeholder="كلمة المرور" />
                <button type="button" onclick="registerUser()">إنشاء حساب</button>
            </div>
            <div id="auth-message" class="auth-message"></div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="container">
            <header>
                <h1>🌍 Country Tourism Comparison</h1>
                <p>Discover differences, hotels, and tourist attractions</p>
                <button id="logout-btn" class="logout-btn" style="display:none;">تسجيل خروج</button>
            </header>

        <div class="selector-section">
            <div class="country-selector">
                <label for="passport">🛂 Select Your Passport:</label>
                <select id="passport" aria-label="Select your nationality" onchange="onPassportChange()">
                    <option value="">-- Choose Passport --</option>
                </select>
            </div>

            <div id="visa-filter-buttons" class="visa-filter-buttons" style="display:none;">
                <p>Choose Search Method:</p>
                <button onclick="filterByVisa('allowed')" class="filter-btn">✅ Countries You Can Enter</button>
                <button onclick="filterByVisa('all-countries')" class="filter-btn">🌍 All Countries</button>
            </div>

            <div class="country-selector">
                <label for="search1">🔍 Search First Country:</label>
                <input 
                    type="text" 
                    id="search1" 
                    class="country-search" 
                    placeholder="Type country name..." 
                    aria-label="Search first country">
                <select id="country1" aria-label="Choose first country">
                    <option value="">-- Choose Country --</option>
                </select>
                <div id="map-preview-1"></div>
            </div>

            <div class="country-selector">
                <label for="search2">🔍 Search Second Country (Optional):</label>
                <input 
                    type="text" 
                    id="search2" 
                    class="country-search" 
                    placeholder="Type country name..." 
                    aria-label="Search second country">
                <select id="country2" aria-label="Choose second country">
                    <option value="">-- Choose Country --</option>
                </select>
                <div id="map-preview-2"></div>
            </div>

            <div class="button-group">
                <button onclick="compareCountries()" class="btn-compare" title="Click or press Enter to compare">Show Comparison</button>
                <button onclick="clearSelections()" class="btn-clear" title="Clear selections">🔄 Reset</button>
            </div>
        </div>

        <div id="visa-info" class="visa-info"></div>

        <div class="quick-select">
            <p>⭐ Popular Countries:</p>
            <div class="quick-buttons">
                <button onclick="selectCountry('Egypt', 1)" class="quick-btn">🇪🇬 Egypt</button>
                <button onclick="selectCountry('Saudi Arabia', 1)" class="quick-btn">🇸🇦 Saudi Arabia</button>
                <button onclick="selectCountry('UAE', 1)" class="quick-btn">🇦🇪 UAE</button>
                <button onclick="selectCountry('France', 1)" class="quick-btn">🇫🇷 France</button>
                <button onclick="selectCountry('Turkey', 1)" class="quick-btn">🇹🇷 Turkey</button>
                <button onclick="selectCountry('Japan', 1)" class="quick-btn">🇯🇵 Japan</button>
                <button onclick="selectCountry('Germany', 1)" class="quick-btn">🇩🇪 Germany</button>
                <button onclick="selectCountry('Italy', 1)" class="quick-btn">🇮🇹 Italy</button>
                <button onclick="selectCountry('Greece', 1)" class="quick-btn">🇬🇷 Greece</button>
                <button onclick="selectCountry('Spain', 1)" class="quick-btn">🇪🇸 Spain</button>
                <button onclick="selectCountry('Tunisia', 1)" class="quick-btn">🇹🇳 Tunisia</button>
                <button onclick="selectCountry('Morocco', 1)" class="quick-btn">🇲🇦 Morocco</button>
            </div>
        </div>

        <!-- Comparison Tabs -->
        <div id="comparison-tabs" class="comparison-tabs" style="display:none;">
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchComparisonTab('general')">📊 General</button>
                <button class="tab-btn" onclick="switchComparisonTab('economy')">💰 Economy</button>
                <button class="tab-btn" onclick="switchComparisonTab('culture')">🎨 Culture</button>
                <button class="tab-btn" onclick="switchComparisonTab('education')">📚 Education</button>
                <button class="tab-btn" onclick="switchComparisonTab('infrastructure')">🌐 Infrastructure</button>
            </div>
            
            <div id="general-tab" class="tab-content active">
                <div id="comparison" class="comparison-section"></div>
            </div>
            
            <div id="economy-tab" class="tab-content">
                <div id="economy-comparison" class="comparison-section"></div>
                <div id="economy-chart-container" style="margin-top: 30px;"></div>
            </div>
            
            <div id="culture-tab" class="tab-content">
                <div id="culture-comparison" class="comparison-section"></div>
                <div id="culture-chart-container" style="margin-top: 30px;"></div>
            </div>
            
            <div id="education-tab" class="tab-content">
                <div id="education-comparison" class="comparison-section"></div>
                <div id="education-chart-container" style="margin-top: 30px;"></div>
            </div>
            
            <div id="infrastructure-tab" class="tab-content">
                <div id="infrastructure-comparison" class="comparison-section"></div>
                <div id="infrastructure-chart-container" style="margin-top: 30px;"></div>
            </div>
        </div>
        
        <div id="global-map-section" style="margin-top:40px;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
